name: Continuous Integration - Smart-Attend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    name: Test and Build Smart-Attend
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Step 2: Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
        
      # Step 4: Run linting checks
      - name: Run ESLint (Code Style)
        run: npm run lint --if-present
        continue-on-error: true
      
      # Step 5: Run Unit Tests
      - name: Run Unit Tests
        run: npm run test:unit -- --coverage
        
      # Step 6: Run Geo-fencing Tests
      - name: Test Geo-fencing Module
        run: npm run test:geofence --if-present
      
      # Step 7: Run Biometric Tests  
      - name: Test Biometric Module
        run: npm run test:biometric --if-present
      
      # Step 8: Security Audit
      - name: Security Audit
        run: npm audit --production
        continue-on-error: true
      
      # Step 9: Build Android APK
      - name: Build Android APK
        run: npm run build:android --if-present
        continue-on-error: true
      
      # Step 10: Build iOS IPA
      - name: Build iOS IPA
        run: npm run build:ios --if-present
        continue-on-error: true
      
      # Step 11: Upload Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: builds
          path: |
            dist/*.apk
            dist/*.ipa
        continue-on-error: true
      
      # Step 12: Report Results
      - name: Test Results Summary
        run: echo "CI pipeline complete - All checks passed!"
